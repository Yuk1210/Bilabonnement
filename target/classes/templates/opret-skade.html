<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar::sidebar}">
</div>

<div class="content">

    <h1>Opret skade</h1>

    <form th:action="@{/skader/gem}"
          th:object="${damageReport}"
          method="post">

        <label>Vælg bil</label>
        <select th:field="*{car.id}">
            <option th:each="car : ${cars}"
                    th:value="${car.id}"
                    th:text="${car.vin}">
            </option>
        </select>

        <label>Skader</label>

        <div class="checkboxes">

            <label>
                <input type="checkbox" value="BULK">
                Bulk skade (500)
            </label>

            <label>
                <input type="checkbox" value="SCRATCH">
                Ridse (200)
            </label>

            <label>
                <input type="checkbox" value="BROKEN_LIGHT">
                Lygte (800)
            </label>

        </div>

        <label>Beskrivelse</label>
        <textarea th:field="*{description}"></textarea>

        <p>
            Total pris:
            <span th:text="${totalPrice}"></span>
        </p>

        <button>Gem</button>

    </form>

</div>

</body>

</html>
