<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar::sidebar}">
</div>

<div class="content">

    <h1>Opret aftale</h1>

    <form
            th:action="@{/aftaler/gem}"
            th:object="${agreement}"
            method="post">

        <input
                type="date"
                th:field="*{startDate}">

        <input
                type="date"
                th:field="*{endDate}">

        <input
                th:field="*{rentalPrice}"
                placeholder="Pris">

        <button>

            Gem

        </button>

    </form>

</div>

</body>

</html>
