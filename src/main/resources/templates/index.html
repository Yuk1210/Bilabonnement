<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dashboard</title>

    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar::sidebar}">
</div>

<div class="content">

    <h1>Dashboard</h1>

    <div class="card">

        <p>Ledige:
            <span th:text="${availableCount}">
</span></p>

        <p>Udlejede:
            <span th:text="${rentedCount}">
</span></p>

        <p>Skadede:
            <span th:text="${damagedCount}">
</span></p>

    </div>

    <table>

        <tr>

            <th>VIN</th>
            <th>Mærke</th>
            <th>Model</th>
            <th>Status</th>

        </tr>

        <tr th:each="car : ${cars}">

            <td th:text="${car.vin}"></td>

            <td th:text="${car.brand}"></td>

            <td th:text="${car.model}"></td>

            <td th:text="${car.status}"></td>

        </tr>

    </table>

</div>

</body>

</html>
